name: CI

on: [push, pull_request]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install package and test deps
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
    - name: Run model smoke tests
      env:
        WANDB_MODE: disabled
      run: |
        pytest -vx tests/test_binary_image.py
        pytest -vx tests/test_cifar_image.py
        pytest -vx tests/test_celeba_image.py
